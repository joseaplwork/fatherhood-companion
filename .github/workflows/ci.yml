name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  guardrails:
    name: Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @fatherhood-companion/db db:generate

      - name: Run guardrails
        run: pnpm guardrails
